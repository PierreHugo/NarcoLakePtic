version: "3.8"

services:
  minio:
    image: minio/minio
    container_name: narcolakeptic-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  prefect:
    image: prefecthq/prefect:2-latest
    container_name: narcolakeptic-prefect
    ports:
      - "4200:4200"
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_UI_API_URL: http://localhost:4200/api

volumes:
  minio_data:
